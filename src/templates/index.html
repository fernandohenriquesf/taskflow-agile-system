<!DOCTYPE html>
<html>
<head>
    <title>TaskFlow</title>
</head>
<body>

<h1>Gerenciador de Tarefas</h1>

<form action="/add" method="POST">
    <input type="text" name="task">
    <button type="submit">Adicionar</button>
</form>

<ul>
    {% for task in tasks %}
    <li>
        {{ task }}
        <a href="/delete/{{ loop.index0 }}">Excluir</a>
    </li>
    {% endfor %}
</ul>

</body>
</html>
